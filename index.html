<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HeavyDuty">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Heavy Duty Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4444;
    --warm: #ff8c42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    /* Safe area for notch/home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .week-badge {
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
  }

  .header-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .days-nav {
    display: flex;
    gap: 6px;
    padding: 14px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .days-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.3px;
  }

  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .day-btn.rest {
    border-style: dashed;
    opacity: 0.5;
  }

  main { padding: 16px 20px 100px; }

  .day-header { margin-bottom: 20px; }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }

  .day-title span { color: var(--accent); }

  .day-muscle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .rest-day {
    text-align: center;
    padding: 60px 20px;
  }

  .rest-icon { font-size: 48px; margin-bottom: 16px; }

  .rest-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .rest-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 260px;
    margin: 0 auto 24px;
  }

  .rest-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .rest-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 12px;
    color: var(--muted);
  }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise-card.all-done { border-color: var(--accent-dim); }

  .exercise-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
  }

  .exercise-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .exercise-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .exercise-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .exercise-card.all-done .exercise-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .sets-container {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 80px 1fr 1fr auto;
    gap: 8px;
    align-items: center;
  }

  .set-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .set-label.set-1 { color: #6699cc; }
  .set-label.set-2 { color: var(--warm); }
  .set-label.set-3 { color: var(--accent); }

  .set-desc {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 10px;
    text-align: center;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; }

  .set-done-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .set-done-btn.done {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .sets-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .notes-area { padding: 0 16px 12px; }

  .notes-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    resize: none;
    min-height: 36px;
    transition: border-color 0.15s, color 0.15s;
  }

  .notes-input:focus { color: var(--text); }

  .progress-section { margin-bottom: 20px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-text {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* WEEK MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .history-entry {
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
  }

  .history-date {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .history-exercise { margin-bottom: 10px; }

  .history-ex-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .history-sets-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .history-set-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .history-set-chip.s1 { border-color: #6699cc44; color: #6699cc; }
  .history-set-chip.s2 { border-color: #ff8c4244; color: var(--warm); }
  .history-set-chip.s3 { border-color: #c8ff0044; color: var(--accent); }

  .history-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
  }

  .week-selector {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }

  .week-selector-label {
    font-size: 13px;
    color: var(--muted);
  }

  .week-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .week-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .week-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 1px;
    min-width: 60px;
    text-align: center;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .btn-history {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-save {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    letter-spacing: 0.3px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-save:active, .btn-history:active { transform: scale(0.97); }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--accent);
    color: #000;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .input-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 3px;
    letter-spacing: 0.3px;
  }

  /* Install banner */
  .install-banner {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 16px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .install-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
  }

  .install-text strong { color: var(--accent); }

  .install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    padding: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">HEAVY DUTY</div>
    <div class="week-badge" id="weekBadge" onclick="openWeekModal()">SEMANA 1 ✎</div>
  </div>
  <div class="header-sub">Tracker · <span id="todayDate"></span></div>
</div>

<div id="installBanner" class="install-banner" style="display:none">
  <div class="install-text">📲 <strong>Instalar app:</strong> Toca Compartir → "Agregar a pantalla de inicio"</div>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<div class="days-nav" id="daysNav"></div>

<main id="mainContent"></main>

<div class="bottom-bar" id="bottomBar">
  <button class="btn-history" onclick="openHistory()">📈 Historial</button>
  <button class="btn-save" onclick="saveSession()">Guardar ✓</button>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal" onclick="closeModal(event,'historyModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">HISTORIAL</div>
    <div id="historyContent"></div>
  </div>
</div>

<!-- Week Modal -->
<div class="modal-overlay" id="weekModal" onclick="closeModal(event,'weekModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">SEMANA ACTUAL</div>
    <div class="week-selector">
      <span class="week-selector-label">Número de semana</span>
      <div class="week-controls">
        <button class="week-btn" onclick="changeWeek(-1)">−</button>
        <span class="week-num" id="weekNumDisplay">1</span>
        <button class="week-btn" onclick="changeWeek(1)">+</button>
      </div>
    </div>
    <button class="btn-save" style="width:100%;margin-top:8px" onclick="closeModal(null,'weekModal')">Listo</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  {
    id: 0, name: 'LUN', rest: false,
    title: 'PECHO', subtitle: 'Pecho · Tríceps',
    exercises: [
      { name: 'Press inclinado' },
      { name: 'Press plano / Lagartijas' },
      { name: 'Extensión en polea' },
      { name: 'Jalón de tríceps unilateral' },
    ]
  },
  {
    id: 1, name: 'MAR', rest: false,
    title: 'ESPALDA', subtitle: 'Espalda · Bíceps',
    exercises: [
      { name: 'Dominadas al pecho' },
      { name: 'Remo en banco' },
      { name: 'Pull over' },
      { name: 'Curl bíceps / Curl araña' },
    ]
  },
  {
    id: 2, name: 'MIÉ', rest: true,
    title: 'DESCANSO', subtitle: 'Recuperación activa',
    restOptions: ['🚶 Caminata 30-45 min', '💪 Core 15 min', '🧘 Movilidad']
  },
  {
    id: 3, name: 'JUE', rest: false,
    title: 'HOMBROS', subtitle: 'Hombros · Trapecios',
    exercises: [
      { name: 'Press militar' },
      { name: 'Elevaciones laterales' },
      { name: 'Trapecios (encogimientos)' },
      { name: 'Deltoide anterior' },
    ]
  },
  {
    id: 4, name: 'VIE', rest: false,
    title: 'PIERNAS', subtitle: 'Cuádriceps · Isquios · Glúteos',
    exercises: [
      { name: 'Sentadillas' },
      { name: 'Peso muerto' },
      { name: 'Hip thrust' },
      { name: 'Extensión de cuádriceps' },
      { name: 'Isquiotibiales' },
    ]
  },
  {
    id: 5, name: 'SÁB', rest: true,
    title: 'DESCANSO', subtitle: 'Recuperación activa',
    restOptions: ['🚶 Caminata 40-45 min', '💪 Core 15 min']
  },
  {
    id: 6, name: 'DOM', rest: true,
    title: 'DESCANSO', subtitle: 'Recuperación total',
    restOptions: ['😴 Descanso completo', '🚶 Caminata suave opcional']
  },
];

const SET_COLORS = ['set-1', 'set-2', 'set-3'];
const SET_LABELS = ['ACTIV.', '70%', 'FALLO'];
const SET_DESC = ['Ligero — calentamiento', '70% del máximo', 'Al fallo — RIR 0'];

// Determine today's day index (Mon=0 ... Sun=6)
let jsDay = new Date().getDay();
let currentDay = jsDay === 0 ? 6 : jsDay - 1;

// State
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem('hd_v2');
    return raw ? JSON.parse(raw) : { week: 1, sessions: {} };
  } catch(e) {
    return { week: 1, sessions: {} };
  }
}

function saveState() {
  try { localStorage.setItem('hd_v2', JSON.stringify(state)); } catch(e) {}
}

function getWeekStart() {
  const now = new Date();
  const d = new Date(now);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function getSessionKey(dayId) {
  return `w${state.week}_d${dayId}_${getWeekStart()}`;
}

function getCurrentSession(dayId) {
  const key = getSessionKey(dayId);
  if (!state.sessions[key]) {
    const day = DAYS[dayId];
    if (!day.rest) {
      state.sessions[key] = {
        date: new Date().toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'short'}),
        dayTitle: day.title,
        exercises: day.exercises.map(ex => ({
          name: ex.name,
          sets: [
            { kg: '', reps: '', done: false },
            { kg: '', reps: '', done: false },
            { kg: '', reps: '', done: false },
          ],
          notes: ''
        }))
      };
    }
  }
  return state.sessions[key];
}

function init() {
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('weekBadge').textContent = `SEM ${state.week} ✎`;
  document.getElementById('weekNumDisplay').textContent = state.week;

  // Show install banner on mobile if not standalone
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = localStorage.getItem('hd_install_dismissed');
  if (!isStandalone && !dismissed && /iPhone|iPad|Android/i.test(navigator.userAgent)) {
    document.getElementById('installBanner').style.display = 'flex';
  }

  renderNav();
  renderDay(currentDay);
}

function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
  try { localStorage.setItem('hd_install_dismissed', '1'); } catch(e) {}
}

function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = DAYS.map(d => {
    let cls = 'day-btn';
    if (d.id === currentDay) cls += ' active';
    if (d.rest) cls += ' rest';
    return `<button class="${cls}" onclick="switchDay(${d.id})">${d.name}</button>`;
  }).join('');
}

function switchDay(id) {
  currentDay = id;
  renderNav();
  renderDay(id);
  window.scrollTo(0, 0);
}

function renderDay(dayId) {
  const day = DAYS[dayId];
  const main = document.getElementById('mainContent');
  const bottomBar = document.getElementById('bottomBar');

  if (day.rest) {
    bottomBar.style.display = 'none';
    const opts = (day.restOptions || []).map(o => `<div class="rest-chip">${o}</div>`).join('');
    main.innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">🛌</div>
        <div class="rest-title">DÍA DE DESCANSO</div>
        <div class="rest-sub">El músculo crece durante la recuperación. Descansa sin culpa.</div>
        <div class="rest-options">${opts}</div>
      </div>`;
    return;
  }

  bottomBar.style.display = 'flex';
  const session = getCurrentSession(dayId);
  const totalSets = session.exercises.length * 3;
  const doneSets = session.exercises.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
  const pct = Math.round((doneSets / totalSets) * 100);

  let html = `
    <div class="day-header">
      <div class="day-title"><span>${day.title}</span></div>
      <div class="day-muscle">${day.subtitle}</div>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span class="progress-text">Progreso de sesión</span>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  session.exercises.forEach((ex, ei) => {
    const allDone = ex.sets.every(s => s.done);
    html += `
      <div class="exercise-card ${allDone ? 'all-done' : ''}" id="card_${ei}">
        <div class="exercise-header">
          <div>
            <div class="exercise-num">EJERCICIO ${ei + 1}</div>
            <div class="exercise-name">${ex.name}</div>
          </div>
          <div class="exercise-check">${allDone ? '✓' : ''}</div>
        </div>
        <div class="sets-container">
          ${ex.sets.map((set, si) => `
            <div>
              <div class="set-row">
                <div>
                  <div class="set-label ${SET_COLORS[si]}">SET ${si+1} — ${set.done ? '✓ HECHO' : SET_LABELS[si]}</div>
                  <div class="set-desc">${SET_DESC[si]}</div>
                </div>
                <div>
                  <div class="input-label">KG</div>
                  <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
                    value="${set.kg}" onchange="updateSet(${dayId},${ei},${si},'kg',this.value)">
                </div>
                <div>
                  <div class="input-label">REPS</div>
                  <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
                    value="${set.reps}" onchange="updateSet(${dayId},${ei},${si},'reps',this.value)">
                </div>
                <button class="set-done-btn ${set.done ? 'done' : ''}"
                  onclick="toggleSetDone(${dayId},${ei},${si})">
                  ${set.done ? '✓' : '○'}
                </button>
              </div>
              ${si < 2 ? '<div class="sets-divider"></div>' : ''}
            </div>
          `).join('')}
        </div>
        <div class="notes-area">
          <textarea class="notes-input" placeholder="Notas (sensaciones, ajustes...)" rows="1"
            onchange="updateNotes(${dayId},${ei},this.value)">${ex.notes}</textarea>
        </div>
      </div>`;
  });

  main.innerHTML = html;
}

function updateSet(dayId, exIdx, setIdx, field, value) {
  const session = getCurrentSession(dayId);
  session.exercises[exIdx].sets[setIdx][field] = value;
  saveState();
}

function toggleSetDone(dayId, exIdx, setIdx) {
  const session = getCurrentSession(dayId);
  session.exercises[exIdx].sets[setIdx].done = !session.exercises[exIdx].sets[setIdx].done;
  saveState();
  const scrollY = window.scrollY;
  renderDay(dayId);
  window.scrollTo(0, scrollY);
}

function updateNotes(dayId, exIdx, value) {
  const session = getCurrentSession(dayId);
  session.exercises[exIdx].notes = value;
  saveState();
}

function saveSession() {
  saveState();
  showToast('✓ Sesión guardada');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openHistory() {
  const modal = document.getElementById('historyModal');
  const content = document.getElementById('historyContent');
  modal.classList.add('open');

  const keys = Object.keys(state.sessions).sort().reverse();
  if (keys.length === 0) {
    content.innerHTML = '<div class="history-empty">Aún no hay sesiones guardadas.</div>';
    return;
  }

  content.innerHTML = keys.map(key => {
    const s = state.sessions[key];
    const exHTML = s.exercises.map(ex => {
      const hasData = ex.sets.some(set => set.kg || set.reps);
      if (!hasData) return '';
      const chipsHTML = ex.sets.map((set, i) => {
        if (!set.kg && !set.reps) return '';
        const cls = ['s1','s2','s3'][i];
        return `<span class="history-set-chip ${cls}">${set.kg||'?'}kg × ${set.reps||'?'}</span>`;
      }).filter(Boolean).join('');
      return `<div class="history-exercise">
        <div class="history-ex-name">${ex.name}</div>
        <div class="history-sets-row">${chipsHTML}</div>
      </div>`;
    }).filter(Boolean).join('');

    if (!exHTML) return '';
    return `
      <div class="history-entry">
        <div class="history-date">📅 ${s.date || key} · ${s.dayTitle || ''}</div>
        ${exHTML}
      </div>`;
  }).filter(Boolean).join('') || '<div class="history-empty">Aún no hay datos registrados.</div>';
}

function openWeekModal() {
  document.getElementById('weekNumDisplay').textContent = state.week;
  document.getElementById('weekModal').classList.add('open');
}

function changeWeek(delta) {
  state.week = Math.max(1, state.week + delta);
  document.getElementById('weekNumDisplay').textContent = state.week;
  document.getElementById('weekBadge').textContent = `SEM ${state.week} ✎`;
  saveState();
}

function closeModal(e, id) {
  if (!e || e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('open');
  }
}

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

init();
</script>
</body>
</html>
