<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTracker">
<meta name="theme-color" content="#0d0a08">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>GymTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0a08; --surface:#151210; --card:#1c1713; --card2:#221e18;
  --border:#2e2720; --border2:#3d3428;
  --accent:#f97316; --accent2:#fb923c; --amber:#f59e0b; --red:#ef4444;
  --text:#f5f0eb; --muted:#7a6a58; --muted2:#5a4a3a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:env(safe-area-inset-top)}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px 10px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:1px;line-height:1;color:var(--accent)}
.logo span{color:var(--text)}
.week-pill{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--accent);letter-spacing:0.3px;cursor:pointer}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:18px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:active{transform:scale(.93)}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;padding:10px 4px 8px;cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.5px;transition:all .18s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.days-nav{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.days-nav::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;padding:7px 13px;cursor:pointer;transition:all .15s;position:relative}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.day-btn.rest{border-style:dashed;opacity:.45}
.day-btn .dot{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--amber)}

main{padding:16px 20px 110px}

.day-header{margin-bottom:18px}
.day-title{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;letter-spacing:1.5px;line-height:1}
.day-title .ac{color:var(--accent)}
.day-muscle{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.progress-pct{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px}
.progress-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:18px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--amber));border-radius:3px;transition:width .4s ease}

.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.ex-card.all-done{border-color:var(--accent)}
.ex-top{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.ex-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;flex-shrink:0}
.ex-name-wrap{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;color:var(--text);cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;display:inline-block;max-width:100%}
.ex-name:hover{border-bottom-color:var(--muted2)}
.ex-name-input{background:var(--card2);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;padding:4px 10px;width:100%;outline:none}
.ex-actions{display:flex;gap:6px;flex-shrink:0}
.ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}
.ex-card.all-done .ex-check{background:var(--accent);border-color:var(--accent);color:#fff}
.del-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--muted2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.del-btn:active{background:#ef444422;color:var(--red);border-color:var(--red)}

.sets-wrap{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px}
.set-row{display:grid;grid-template-columns:76px 1fr 1fr 36px;gap:6px;align-items:center}
.set-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.set-tag.s0{color:#94a3b8}.set-tag.s1{color:var(--amber)}.set-tag.s2{color:var(--accent)}
.set-hint{font-size:9px;color:var(--muted2);margin-top:1px}
.set-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:7px 6px;text-align:center;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
.set-input:focus{border-color:var(--accent)}
.set-input::placeholder{color:var(--muted2);font-size:11px;font-weight:400}
.set-check{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border2);background:none;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.set-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.set-divider{height:1px;background:var(--border);margin:2px 0}
.inp-lbl{font-size:9px;color:var(--muted);text-align:center;margin-bottom:2px;letter-spacing:.3px}

.notes-wrap{padding:0 14px 10px}
.notes-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;padding:7px 10px;width:100%;outline:none;resize:none;min-height:34px;transition:color .15s}
.notes-input:focus{color:var(--text)}

.add-ex-btn{width:100%;background:none;border:1.5px dashed var(--border2);border-radius:14px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:13px;cursor:pointer;transition:all .15s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.add-ex-btn:active{border-color:var(--accent);color:var(--accent)}

.rest-screen{text-align:center;padding:50px 20px}
.rest-emoji{font-size:52px;margin-bottom:14px}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;letter-spacing:2px;color:var(--muted);margin-bottom:8px}
.rest-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:260px;margin:0 auto 22px}
.rest-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.rest-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted)}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;color:var(--text);text-transform:uppercase}
.cal-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-wd{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:all .15s;user-select:none}
.cal-day.empty{background:none;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--accent)}
.cal-day.completed{background:var(--accent);border-color:var(--accent)}
.cal-day.manual{background:#f9731622;border-color:var(--accent)}
.cal-day-num{font-size:13px;font-weight:600;color:var(--text);line-height:1}
.cal-day.completed .cal-day-num{color:#fff;font-weight:700}
.cal-day.empty .cal-day-num{color:transparent}
.cal-day .cal-mark{font-size:9px;margin-top:1px}
.cal-week-badge{font-size:9px;color:var(--amber);font-weight:700;margin-top:1px}
.cal-legend{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* HISTORY */
.history-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
.history-entry{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.history-entry-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.history-entry-date{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.history-entry-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.history-exercises{padding:10px 14px 12px;display:flex;flex-direction:column;gap:10px}
.history-ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.history-sets-row{display:flex;gap:5px;flex-wrap:wrap}
.h-chip{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-size:11px}
.h-chip.s0{color:#94a3b8;border-color:#94a3b822}.h-chip.s1{color:var(--amber);border-color:#f59e0b22}.h-chip.s2{color:var(--accent);border-color:#f9731622}

/* START DATE modal info */
.start-info{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.start-info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.start-info-row:last-child{margin-bottom:0}
.si-label{font-size:12px;color:var(--muted)}
.si-val{font-size:14px;font-weight:600;color:var(--accent)}
.si-hint{font-size:11px;color:var(--muted2);margin-top:8px;line-height:1.5}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:50}
.btn-secondary{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:13px;cursor:pointer;transition:all .15s}
.btn-primary{flex:2;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:13px;cursor:pointer;transition:all .15s}
.btn-primary:active,.btn-secondary:active{transform:scale(.97)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-top:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 18px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;letter-spacing:1.5px;color:var(--accent);margin-bottom:16px}

.data-section{margin-bottom:14px}
.data-label{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.data-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all .15s}
.data-btn:active{border-color:var(--accent);color:var(--accent)}
.data-btn.danger:active{border-color:var(--red);color:var(--red)}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:20px;opacity:0;transition:all .25s;z-index:400;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#importInput{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Gym<span>Tracker</span></div>
  <div class="header-actions">
    <div class="week-pill" id="weekPill" onclick="openWeekInfo()">SEM —</div>
    <button class="icon-btn" onclick="openDataModal()">⚙️</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('workout')">Entreno</button>
  <button class="tab" onclick="switchTab('calendar')">Calendario</button>
  <button class="tab" onclick="switchTab('history')">Historial</button>
</div>

<div id="daysNavWrap">
  <div class="days-nav" id="daysNav"></div>
</div>

<main id="mainContent"></main>

<div class="bottom-bar" id="bottomBar">
  <button class="btn-secondary" onclick="saveSession()">Guardar ✓</button>
  <button class="btn-primary" onclick="openWeekInfo()">📅 Ver semana</button>
</div>

<!-- Week info modal (read-only, automatic) -->
<div class="modal-overlay" id="weekModal" onclick="closeModal(event,'weekModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">SEMANA ACTUAL</div>
    <div class="start-info" id="weekInfoContent"></div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px">
      La semana se calcula automáticamente desde tu primera vez usando la app. No necesitas cambiarla manualmente.
    </div>
    <button class="btn-primary" style="width:100%;margin-top:14px" onclick="closeModal(null,'weekModal')">Entendido</button>
  </div>
</div>

<!-- Data modal -->
<div class="modal-overlay" id="dataModal" onclick="closeModal(event,'dataModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">DATOS</div>
    <div class="data-section">
      <div class="data-label">📤 Respaldo</div>
      <button class="data-btn" onclick="exportData()">⬇️ Exportar historial (.json)</button>
      <button class="data-btn" onclick="document.getElementById('importInput').click()">⬆️ Importar historial (.json)</button>
      <input type="file" id="importInput" accept=".json" onchange="importData(event)">
    </div>
    <div class="data-section">
      <div class="data-label">⚠️ Peligro</div>
      <button class="data-btn danger" onclick="clearAllData()">🗑️ Borrar todos los datos</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_DAYS = [
  { id:0, name:'LUN', rest:false, title:'PUSH', subtitle:'Pecho · Hombros · Tríceps',
    exercises:['Press inclinado','Press plano / Lagartijas','Press militar','Elevaciones laterales','Extensión en polea'] },
  { id:1, name:'MAR', rest:false, title:'PULL', subtitle:'Espalda · Bíceps',
    exercises:['Dominadas al pecho','Remo en banco','Pull over','Curl bíceps / Curl araña'] },
  { id:2, name:'MIÉ', rest:true, title:'DESCANSO', subtitle:'Recuperación activa',
    restOptions:['🚶 Caminata 35-40 min','💪 Core 15 min','🧘 Movilidad'] },
  { id:3, name:'JUE', rest:false, title:'PIERNAS', subtitle:'Cuádriceps · Isquios · Glúteos',
    exercises:['Sentadillas','Peso muerto','Hip thrust','Extensión de cuádriceps','Isquiotibiales'] },
  { id:4, name:'VIE', rest:false, title:'UPPER', subtitle:'Pecho · Espalda · Brazos',
    exercises:['Press inclinado','Remo barra agarre supino','Jalón de tríceps','Curl martillo'] },
  { id:5, name:'SÁB', rest:false, title:'HOMBROS', subtitle:'Hombros · Trapecios · Brazos',
    exercises:['Press militar','Elevaciones laterales','Trapecios','Curl bíceps','Extensión tríceps'] },
  { id:6, name:'DOM', rest:true, title:'DESCANSO', subtitle:'Recuperación total',
    restOptions:['😴 Descanso completo','🚶 Caminata suave opcional'] },
];

const SET_TAGS  = ['ACTIV.','70%','FALLO'];
const SET_HINTS = ['Ligero','70% del máximo','Al fallo — RIR 0'];
const SET_CLS   = ['s0','s1','s2'];

// ── WEEK CALCULATION ──
// Automatically compute week number from the first time the user opened the app
function getStartDate() {
  let start = localStorage.getItem('gt_start_date');
  if (!start) {
    // First time — set start to the Monday of the current week
    const now = new Date();
    const day = now.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    const monday = new Date(now);
    monday.setDate(now.getDate() + diff);
    start = monday.toISOString().split('T')[0];
    localStorage.setItem('gt_start_date', start);
  }
  return start;
}

function getCurrentWeekNumber() {
  const startStr = getStartDate();
  const start = new Date(startStr + 'T00:00:00');
  const now = new Date();
  // Get Monday of current week
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() + diff);
  thisMonday.setHours(0,0,0,0);
  start.setHours(0,0,0,0);
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const weekNum = Math.floor((thisMonday - start) / msPerWeek) + 1;
  return Math.max(1, weekNum);
}

function getCurrentWeekStart() {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  return monday.toISOString().split('T')[0];
}

// ── STATE ──
let state = loadState();
let currentDay = todayIndex();
let currentTab = 'workout';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function todayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function loadState() {
  try {
    const r = localStorage.getItem('gt_v2');
    if (r) return JSON.parse(r);
  } catch(e) {}
  return { sessions: {}, customDays: null, calMarks: {} };
}

function saveState() {
  try { localStorage.setItem('gt_v2', JSON.stringify(state)); } catch(e) {}
}

function getDays() { return state.customDays || DEFAULT_DAYS; }

// ── SESSION KEY uses real week number ──
function sessionKey(dayId) {
  const week = getCurrentWeekNumber();
  return `w${week}_d${dayId}_${getCurrentWeekStart()}`;
}

function getSession(dayId) {
  const key = sessionKey(dayId);
  const day = getDays()[dayId];
  if (!state.sessions[key] && !day.rest) {
    const week = getCurrentWeekNumber();
    state.sessions[key] = {
      date: new Date().toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'short'}),
      dayTitle: day.title,
      week,
      exercises: day.exercises.map(n => ({
        name: n,
        sets: [{kg:'',reps:'',done:false},{kg:'',reps:'',done:false},{kg:'',reps:'',done:false}],
        notes: ''
      }))
    };
  }
  return state.sessions[key];
}

function isSessionComplete(dayId) {
  const s = getSession(dayId);
  if (!s) return false;
  return s.exercises.length > 0 && s.exercises.every(ex => ex.sets.every(set => set.done));
}

// ── INIT ──
function init() {
  if (!state.calMarks) state.calMarks = {};
  getStartDate(); // ensure start date is set on first open
  updateWeekPill();
  renderNav();
  renderTab();
}

function updateWeekPill() {
  const week = getCurrentWeekNumber();
  document.getElementById('weekPill').textContent = `SEM ${week}`;
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['workout','calendar','history'][i] === tab);
  });
  document.getElementById('daysNavWrap').style.display = tab === 'workout' ? '' : 'none';
  document.getElementById('bottomBar').style.display = tab === 'workout' ? 'flex' : 'none';
  renderTab();
}

function renderTab() {
  if (currentTab === 'workout') { renderNav(); renderDay(currentDay); }
  else if (currentTab === 'calendar') renderCalendar();
  else renderHistory();
}

// ── NAV ──
function renderNav() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = getDays().map(d => {
    let cls = 'day-btn';
    if (d.id === currentDay) cls += ' active';
    if (d.rest) cls += ' rest';
    const dot = !d.rest && isSessionComplete(d.id) ? '<span class="dot"></span>' : '';
    return `<button class="${cls}" onclick="switchDay(${d.id})">${d.name}${dot}</button>`;
  }).join('');
}

function switchDay(id) {
  currentDay = id;
  renderNav();
  renderDay(id);
  window.scrollTo(0,0);
}

// ── WORKOUT ──
function renderDay(dayId) {
  const day = getDays()[dayId];
  const main = document.getElementById('mainContent');
  if (day.rest) {
    const opts = (day.restOptions||[]).map(o=>`<div class="rest-chip">${o}</div>`).join('');
    main.innerHTML = `<div class="rest-screen"><div class="rest-emoji">🛌</div><div class="rest-title">DESCANSO</div><div class="rest-sub">El músculo crece en la recuperación. Descansa sin culpa.</div><div class="rest-chips">${opts}</div></div>`;
    return;
  }
  const session = getSession(dayId);
  const totalSets = session.exercises.length * 3;
  const doneSets  = session.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
  const pct = totalSets ? Math.round(doneSets/totalSets*100) : 0;

  let html = `
    <div class="day-header">
      <div class="day-title"><span class="ac">${day.title}</span></div>
      <div class="day-muscle">${day.subtitle}</div>
    </div>
    <div class="progress-row">
      <span class="progress-label">Progreso</span>
      <span class="progress-pct">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  session.exercises.forEach((ex, ei) => {
    const allDone = ex.sets.every(s=>s.done);
    html += `
      <div class="ex-card ${allDone?'all-done':''}" id="excard_${ei}">
        <div class="ex-top">
          <div class="ex-num">EJ.${ei+1}</div>
          <div class="ex-name-wrap">
            <span class="ex-name" onclick="startEditName(${dayId},${ei})" id="exname_${ei}">${ex.name}</span>
          </div>
          <div class="ex-actions">
            <div class="ex-check">${allDone?'✓':''}</div>
            <button class="del-btn" onclick="deleteExercise(${dayId},${ei})">✕</button>
          </div>
        </div>
        <div class="sets-wrap">
          ${ex.sets.map((set,si)=>`
            <div>
              <div class="set-row">
                <div>
                  <div class="set-tag ${SET_CLS[si]}">SET ${si+1} · ${set.done?'✓':SET_TAGS[si]}</div>
                  <div class="set-hint">${SET_HINTS[si]}</div>
                </div>
                <div>
                  <div class="inp-lbl">KG</div>
                  <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
                    value="${set.kg}" onchange="updateSet(${dayId},${ei},${si},'kg',this.value)">
                </div>
                <div>
                  <div class="inp-lbl">REPS</div>
                  <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
                    value="${set.reps}" onchange="updateSet(${dayId},${ei},${si},'reps',this.value)">
                </div>
                <button class="set-check ${set.done?'done':''}" onclick="toggleSet(${dayId},${ei},${si})">
                  ${set.done?'✓':'○'}
                </button>
              </div>
              ${si<2?'<div class="set-divider"></div>':''}
            </div>`).join('')}
        </div>
        <div class="notes-wrap">
          <textarea class="notes-input" placeholder="Notas..." rows="1"
            onchange="updateNotes(${dayId},${ei},this.value)">${ex.notes}</textarea>
        </div>
      </div>`;
  });

  html += `<button class="add-ex-btn" onclick="addExercise(${dayId})">＋ Agregar ejercicio</button>`;
  main.innerHTML = html;
  if (pct === 100) autoMarkToday();
}

// ── EXERCISE EDIT ──
function startEditName(dayId, exIdx) {
  const span = document.getElementById(`exname_${exIdx}`);
  const current = span.textContent;
  const input = document.createElement('input');
  input.className = 'ex-name-input';
  input.value = current;
  span.replaceWith(input);
  input.focus(); input.select();
  const finish = () => {
    const val = input.value.trim() || current;
    getSession(dayId).exercises[exIdx].name = val;
    syncCustomDay(dayId, exIdx, val);
    saveState(); renderDay(dayId);
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); });
}

function syncCustomDay(dayId, exIdx, val) {
  if (!state.customDays) state.customDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  if (state.customDays[dayId].exercises[exIdx] !== undefined)
    state.customDays[dayId].exercises[exIdx] = val;
}

function addExercise(dayId) {
  const s = getSession(dayId);
  s.exercises.push({ name:'Nuevo ejercicio', sets:[{kg:'',reps:'',done:false},{kg:'',reps:'',done:false},{kg:'',reps:'',done:false}], notes:'' });
  if (!state.customDays) state.customDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  state.customDays[dayId].exercises.push('Nuevo ejercicio');
  saveState(); renderDay(dayId);
  setTimeout(() => startEditName(dayId, s.exercises.length - 1), 50);
}

function deleteExercise(dayId, exIdx) {
  const s = getSession(dayId);
  s.exercises.splice(exIdx, 1);
  if (!state.customDays) state.customDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  if (state.customDays[dayId].exercises[exIdx] !== undefined)
    state.customDays[dayId].exercises.splice(exIdx, 1);
  saveState(); renderDay(dayId);
}

// ── SETS ──
function updateSet(dayId, ei, si, field, val) { getSession(dayId).exercises[ei].sets[si][field] = val; saveState(); }
function toggleSet(dayId, ei, si) {
  const set = getSession(dayId).exercises[ei].sets[si];
  set.done = !set.done;
  saveState();
  const sy = window.scrollY;
  renderDay(dayId); renderNav();
  window.scrollTo(0, sy);
  const s = getSession(dayId);
  if (s.exercises.every(ex=>ex.sets.every(s=>s.done))) autoMarkToday();
}
function updateNotes(dayId, ei, val) { getSession(dayId).exercises[ei].notes = val; saveState(); }
function saveSession() { saveState(); showToast('✓ Sesión guardada'); }

// ── CALENDAR ──
function autoMarkToday() {
  const today = new Date().toISOString().split('T')[0];
  if (!state.calMarks[today]) { state.calMarks[today] = 'auto'; saveState(); }
}

function renderCalendar() {
  const main = document.getElementById('mainContent');
  const year = calYear, month = calMonth;
  const monthName = new Date(year, month, 1).toLocaleDateString('es-MX', {month:'long', year:'numeric'});
  const firstDay = new Date(year, month, 1).getDay();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];
  const startDateStr = getStartDate();

  let cells = '';
  for (let i=0; i<startOffset; i++) cells += `<div class="cal-day empty"><span class="cal-day-num">-</span></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const mark = state.calMarks[dateStr];

    // compute which week number this date falls in
    const thisDate = new Date(dateStr + 'T00:00:00');
    const startDate = new Date(startDateStr + 'T00:00:00');
    const msPerWeek = 7*24*60*60*1000;
    const dayOfWeek = thisDate.getDay();
    const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    const thisMonday = new Date(thisDate);
    thisMonday.setDate(thisDate.getDate() + diffToMonday);
    thisMonday.setHours(0,0,0,0);
    startDate.setHours(0,0,0,0);
    const weekNum = thisDate >= startDate ? Math.floor((thisMonday - startDate) / msPerWeek) + 1 : null;

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (mark === 'auto') cls += ' completed';
    else if (mark === 'manual') cls += ' manual';
    const icon = mark === 'auto' ? '🔥' : mark === 'manual' ? '✓' : '';
    const weekLabel = weekNum && weekNum >= 1 && !mark ? `<span class="cal-week-badge">S${weekNum}</span>` : '';

    cells += `<div class="${cls}" onclick="toggleCalDay('${dateStr}')">
      <span class="cal-day-num">${d}</span>
      ${mark ? `<span class="cal-mark">${icon}</span>` : weekLabel}
    </div>`;
  }

  main.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
      <div class="cal-title">${monthName.toUpperCase()}</div>
      <button class="cal-nav-btn" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-weekdays">${['L','M','X','J','V','S','D'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="legend-dot" style="background:var(--accent)"></div><span>Completado 🔥</span></div>
      <div class="cal-legend-item"><div class="legend-dot" style="background:#f9731622;border:1px solid var(--accent)"></div><span>Manual ✓</span></div>
      <div class="cal-legend-item"><div class="legend-dot" style="border:1px solid var(--accent)"></div><span>Hoy</span></div>
      <div class="cal-legend-item"><div class="legend-dot" style="background:var(--card)"></div><span>S# = semana</span></div>
    </div>`;
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function toggleCalDay(dateStr) {
  const cur = state.calMarks[dateStr];
  if (!cur) state.calMarks[dateStr] = 'manual';
  else delete state.calMarks[dateStr];
  saveState(); renderCalendar();
}

// ── HISTORY ──
function renderHistory() {
  const main = document.getElementById('mainContent');
  const keys = Object.keys(state.sessions).sort().reverse();
  if (!keys.length) { main.innerHTML = `<div class="history-empty">Aún no hay sesiones guardadas.</div>`; return; }
  const html = keys.map(key => {
    const s = state.sessions[key];
    const exHTML = s.exercises.map(ex => {
      const chips = ex.sets.map((set,i) => {
        if (!set.kg && !set.reps) return '';
        return `<span class="h-chip ${SET_CLS[i]}">${set.kg||'?'}kg × ${set.reps||'?'}</span>`;
      }).filter(Boolean).join('');
      if (!chips) return '';
      return `<div><div class="history-ex-name">${ex.name}</div><div class="history-sets-row">${chips}</div></div>`;
    }).filter(Boolean).join('');
    if (!exHTML) return '';
    return `<div class="history-entry">
      <div class="history-entry-header">
        <div class="history-entry-date">📅 ${s.date||key}</div>
        <div class="history-entry-title">${s.dayTitle||''} · Sem ${s.week||'?'}</div>
      </div>
      <div class="history-exercises">${exHTML}</div>
    </div>`;
  }).filter(Boolean).join('');
  main.innerHTML = html || `<div class="history-empty">Aún no hay datos registrados.</div>`;
}

// ── WEEK INFO MODAL ──
function openWeekInfo() {
  const week = getCurrentWeekNumber();
  const start = getStartDate();
  const startFmt = new Date(start + 'T00:00:00').toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const now = new Date();
  const thisMonFmt = new Date(getCurrentWeekStart() + 'T00:00:00').toLocaleDateString('es-MX', {day:'numeric', month:'long'});
  document.getElementById('weekInfoContent').innerHTML = `
    <div class="start-info-row"><span class="si-label">Semana actual</span><span class="si-val">Semana ${week}</span></div>
    <div class="start-info-row"><span class="si-label">Inicio del plan</span><span class="si-val">${startFmt}</span></div>
    <div class="start-info-row"><span class="si-label">Esta semana desde</span><span class="si-val">${thisMonFmt}</span></div>
    <div class="si-hint">La semana avanza automáticamente cada lunes. No necesitas hacer nada.</div>`;
  document.getElementById('weekModal').classList.add('open');
}

// ── DATA MODAL ──
function openDataModal() { document.getElementById('dataModal').classList.add('open'); }

function exportData() {
  const exportObj = { state, startDate: getStartDate() };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gymtracker-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exportado correctamente');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.state && data.state.sessions) {
        state = data.state;
        if (data.startDate) localStorage.setItem('gt_start_date', data.startDate);
        saveState(); showToast('✓ Datos importados');
        closeModal(null,'dataModal'); init();
      } else { showToast('⚠ Archivo inválido'); }
    } catch(err) { showToast('⚠ Error al importar'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAllData() {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  state = { sessions:{}, customDays:null, calMarks:{} };
  localStorage.removeItem('gt_start_date');
  saveState(); closeModal(null,'dataModal'); showToast('Datos borrados'); init();
}

function closeModal(e, id) {
  if (!e || e.target === document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

init();
</script>
